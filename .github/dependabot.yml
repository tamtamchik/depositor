version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    # New releases sit out two weeks before Dependabot proposes them
    cooldown:
      default-days: 14
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 14
